parameters:
  - name: serviceConnection
    type: string

  - name: subscriptionId
    type: string

  - name: resourceGroup
    type: string
    default: ''

stages:
- stage: ZAP_Security_Scan
  displayName: "ZAP DAST Security Scan"
  jobs:
  - job: Discover_And_Scan
    displayName: "Discover Azure Function Apps and Run ZAP"
    pool:
      vmImage: 'ubuntu-latest'

    steps:

    # =============================
    # Login and discover apps
    # =============================
    - task: AzureCLI@2
      displayName: "Discover Function Apps"
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az account set --subscription ${{ parameters.subscriptionId }}

          if [ -z "${{ parameters.resourceGroup }}" ]; then
            apps=$(az functionapp list --query "[].defaultHostName" -o tsv)
          else
            apps=$(az functionapp list -g ${{ parameters.resourceGroup }} --query "[].defaultHostName" -o tsv)
          fi

          echo "$apps" > functionapps.txt

    # =========================================
    # Run ZAP Baseline Scan and generate XML
    # =========================================
    - script: |
        mkdir -p zap-reports
        chmod 777 zap-reports

        while read app; do
          echo "Scanning https://$app"

          docker run --rm \
            --user root \
            -v $(pwd)/zap-reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t https://$app \
              -j \
              -x ${app}.xml || true

        done < functionapps.txt
      displayName: "Run ZAP Baseline Scan"

    # =============================
    # Publish test results
    # =============================
    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'zap-reports/*.xml'
        failTaskOnFailedTests: true
