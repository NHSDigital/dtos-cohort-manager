parameters:
  - name: hostPoolName
    type: string
  - name: serviceConnection
    type: string
  - name: targetSubscriptionId
    type: string
  - name: terraformActions
    type: string
  - name: tfVarsFile
    type: string
  - name: environment
    type: string
  - name: resourceGroupNameSql
    type: string
  - name: databaseManagementJobName
    type: string
  - name: dockerImageTag
    type: string
  - name: retagImages
    type: boolean
  - name: retagImagesFrom
    type: string
  - name: retagImagesTo
    type: string
  - name: slackWebHook
    type: string
    default: ''

stages:
- stage: re_tag_stage
  # Only required until commit hashes are passed in by calling pipeline, except for the
  # PreProd pipeline which needs to retag images to move them from the Dev ACR to the Prod ACR
  displayName: ACR re-tag
  condition: in('${{ parameters.retagImages }}', 'true')
  pool:
    name: ${{ parameters.hostPoolName }}
  jobs:
    - job: re_tag
      displayName: Re-tag Docker images
      variables:
        SELECT_IMAGE_TAG: ${{ parameters.retagImagesFrom }}
        ADD_IMAGE_TAG: ${{ parameters.retagImagesTo }}
      steps:
        - template: .azuredevops/templates/steps/acr-import-retag-no-additional-tags.yaml@dtos-devops-templates
          parameters:
            serviceConnection: ${{ parameters.serviceConnection }}

- stage: terraform_deploy
  ${{ if eq(parameters.terraformActions, 'Apply') }}:
    displayName: Terraform Deploy
  ${{ else }}:
    displayName: Terraform Plan Only
  condition: in(dependencies.re_tag_stage.result, 'Succeeded', 'Skipped')
  variables:
    tfVarsFile: ${{ parameters.tfVarsFile }}
  pool:
    name: ${{ parameters.hostPoolName }}
  jobs:
    - job: init_and_plan
      displayName: Init, plan, store artifact
      steps:
        - checkout: self
        - checkout: dtos-devops-templates
        - template: .azuredevops/templates/steps/tf_plan.yaml@dtos-devops-templates
          parameters:
            tfCommandOptions: '-var="docker_image_tag=${{ parameters.dockerImageTag }}"'

    - deployment: terraform_apply
      displayName: Init, get plan artifact, apply
      environment: ${{ parameters.environment }}
      dependsOn: init_and_plan
      condition: |
        and(
          eq(dependencies.init_and_plan.outputs['TerraformPlan.changesPresent'], 'true'), 
          eq('${{ parameters.terraformActions }}', 'Apply')
        )
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - checkout: dtos-devops-templates
              - template: .azuredevops/templates/steps/tf_apply.yaml@dtos-devops-templates

- stage: db_changes_stage
  displayName: Database changes
  dependsOn: terraform_deploy
  condition: in(dependencies.terraform_deploy.result, 'Succeeded', 'Skipped')
  pool:
    name: ${{ parameters.hostPoolName }}
  jobs:
    - job: db_changes
      displayName: Apply database changes
      steps:
        - checkout: self
        - checkout: dtos-devops-templates
        - template: .azuredevops/templates/steps/app-container-job-start.yaml@dtos-devops-templates
          parameters:
            serviceConnection: ${{ parameters.serviceConnection }}
            targetSubscriptionId: ${{ parameters.targetSubscriptionId }}
            resourceGroupName: ${{ parameters.resourceGroupNameSql }}
            jobName: ${{ parameters.databaseManagementJobName }}

- stage: restart_functions_stage
  displayName: Restart Function Apps
  dependsOn: db_changes_stage
  condition: in(dependencies.db_changes_stage.result, 'Succeeded', 'Skipped')
  pool:
    name: ${{ parameters.hostPoolName }}
  jobs:
    - job: restart_functions
      displayName: Restart Function Apps to load new images
      steps:
        - template: .azuredevops/templates/steps/app-services-restart.yaml@dtos-devops-templates
          parameters:
            serviceConnection: ${{ parameters.serviceConnection }}

- stage: notify_stage
  displayName: Send Slack Notification
  # Depend only on the last stage in the flow
  dependsOn: restart_functions_stage
  condition: |
    and(
      succeededOrFailed(),
      eq(variables['Build.SourceBranch'], 'refs/feat/dtoss-10921-slack-generic-messaging'),
      ne('${{ parameters.slackWebHook }}', '')
    )
  pool:
    name: ${{ parameters.hostPoolName }}
  jobs:
    - job: notify
      displayName: Send Slack Notification
      steps:
        - checkout: dtos-devops-templates
          sparseCheckoutDirectories: scripts
          path: templates
          displayName: 'Checkout Templates Repo'

        - task: PowerShell@2
          displayName: 'Build Slack Message'
          name: BuildSlackMessage
          inputs:
            targetType: 'inline'
            script: |
              # Check if the overall pipeline has succeeded or failed
              $isSucceeded = $Host.Variables.['pipeline.status'] -eq 'Succeeded'

              # Build the list of stages and their results
              $allStages = @(
                  @{ name = "ACR re-tag"; result = "$(dependencies.re_tag_stage.result)" },
                  @{ name = "Terraform Deploy"; result = "$(dependencies.terraform_deploy.result)" },
                  @{ name = "Database Changes"; result = "$(dependencies.db_changes_stage.result)" },
                  @{ name = "Restart Functions"; result = "$(dependencies.restart_functions_stage.result)" }
              )

              # Build the success message
              if ($isSucceeded) {
                  $message = "✅ The infrastructure deployment for the ${{ parameters.environment }} environment has completed.`n`n"
                  $message += "Here are the results of the stages:`n"
                  foreach ($stage in $allStages) {
                      $message += "• $($stage.name): $($stage.result)`n"
                  }
                  $message += "`n⚙️ Please check the ADO pipeline results for details: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)`n"
                  $message += "📊 NOTE: End to End tests may still be running: please check #cohort-manager-tests for completed test results.`n"
                  
                  # --- Begin dynamic approval message logic ---
                  # Hard-coded environment lifecycle mappings
                  $envLifecycle = @{
                      "development" = "nft"
                      "nft" = "integration"
                      "integration" = "preprod"
                      "preprod" = "production"
                  }

                  $currentEnv = "${{ parameters.environment }}"
                  
                  # Check if the current environment has a next stage
                  if ($envLifecycle.ContainsKey($currentEnv)) {
                      $nextEnv = $envLifecycle[$currentEnv]
                      $approvalMessage = "`n`nTo approve the push of this code from <$currentEnv> to <$nextEnv> click here: https://github.com/NHSDigital/dtos-cohort-manager/actions?query=branch%3Amain`n"
                      $message += $approvalMessage
                  }
                  # --- End dynamic approval message logic ---

                  Write-Host "##vso[task.setvariable variable=slackSuccessMessage]$message"
              }
              # Build the failure message
              else {
                  $message = "❌ The infrastructure deployment for the ${{ parameters.environment }} environment has failed.`n`n"
                  $message += "The following stages encountered an issue:`n"
                  foreach ($stage in $allStages) {
                      if ($stage.result -ne "Succeeded" -and $stage.result -ne "Skipped") {
                          $message += "• $($stage.name): $($stage.result)`n"
                      }
                  }
                  $message += "`n⚙️ Please check the ADO pipeline results for details: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
                  
                  Write-Host "##vso[task.setvariable variable=slackFailureMessage]$message"
              }
          condition: always()

        - task: PythonScript@0
          name: slack_success
          displayName: Send Slack Notification (Success)
          condition: succeeded()
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Pipeline.Workspace)/templates/scripts/integrations/slack/SlackIntegrator.py'
            arguments: >
              --webhook "${{ parameters.slackWebHook }}"
              --message "$(slackSuccessMessage)"

        - task: PythonScript@0
          name: slack_failure
          displayName: Send Slack Notification (Failure)
          condition: failed()
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Pipeline.Workspace)/templates/scripts/integrations/slack/SlackIntegrator.py'
            arguments: >
              --webhook "${{ parameters.slackWebHook }}"
              --message "$(slackFailureMessage)"
