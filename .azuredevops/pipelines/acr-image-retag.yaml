---

name: $(Build.SourceBranchName)-$(Date:yyyyMMdd)_$(Rev:r)
trigger: none
pr: none

resources:
  repositories:
    - repository: dtos-devops-templates
      type: github
      name: NHSDigital/dtos-devops-templates
      ref: feat/acr-retag-support-for-cohman
      endpoint: NHSDigital

parameters:
  - name: sourceRegistry
    displayName: Source Container Registry
    type: string
    values:
      - acrukscohmandev
      - acrukshubdevcohman
      - acrukshubprodcohman
    default: acrukscohmandev

  - name: selectImageTag
    displayName: Select Image Tag
    type: string
    values:
      - development
      - nft
      - integration
      - preprod
    default: development

  - name: destRegistry
    displayName: Destination Container Registry
    type: string
    values:
      - acrukscohmandev
      - acrukshubdevcommgt
      - acrukshubprodcommgt
    default: acrukscohmandev

  - name: addImageTag
    displayName: Target Image Tag
    type: string
    values:
      - development
      - nft
      - integration
      - preprod
      - production
    default: nft

variables:
  - group: DEV_hub_backend_remote_state
  - group: development_variable_group

stages:
- stage: re_tag_stage
  displayName: ACR re-tag
  jobs:
  - job: re_tag
    pool:
      name: private-pool-prod-uks
    displayName: Update/copy Docker images with new tag
    variables:
      SRC_REGISTRY: ${{ parameters.sourceRegistry }}
      DEST_REGISTRY: ${{ parameters.destRegistry }}
      SELECT_IMAGE_TAG: ${{ parameters.selectImageTag }}
      ADD_IMAGE_TAG: ${{ parameters.addImageTag }}
    steps:
      - template: .azuredevops/templates/steps/acr-import-retag.yaml@dtos-devops-templates
        parameters:
          serviceConnection: sc-cohort-manager-prod
          
