name: cohort-manager-pipeline
services:
  db-migration:
    container_name: db-migration
    networks: [cohman-network]
    profiles: [pipeline]
    build:
      context: ./src/Functions/
      dockerfile: Shared/DataServices.Migrations/Dockerfile
    environment:
      - DtOsDatabaseConnectionString=Server=sql-server;Database=${DB_NAME};User Id=SA;Password=${PASSWORD};TrustServerCertificate=True
    cap_add:
      - SYS_PTRACE
    restart: "no"

  wiremock:
    container_name: wiremock
    networks: [cohman-network]
    image: wiremock/wiremock
    ports:
      - "8080:8080"
    volumes:
      - ./Set-up/wiremock/mappings:/home/wiremock/mappings
    command: --verbose --root-dir /home/wiremock

networks:
  cohman-network:
    external: true
