name: "Manual Cohort Manager Image Build"

on:
  workflow_dispatch:
    inputs:
      environment_tag:
        description: Environment of the deployment
        required: true
        type: string
        default: development
      build_all_images:
        description: Build all images defined in compose files
        required: false
        type: boolean
        default: false

jobs:
  checkout-and-prepare:
    runs-on: ubuntu-latest
    outputs:
      environment_tag: ${{ steps.set-values.outputs.environment_tag }}
      build_all_images: ${{ steps.set-values.outputs.build_all_images }}
    steps:
      # - name: Checkout source code
      #   uses: actions/checkout@v4
      #   with:
      #     submodules: 'true'
      #     ref: main
      - name: Set output values
        id: set-values
        run: |
          echo "environment_tag=${{ inputs.environment_tag }}" >> $GITHUB_OUTPUT
          echo "build_all_images=${{ inputs.build_all_images == 'true' }}" >> $GITHUB_OUTPUT

  prepare-docker-samples:
    needs: checkout-and-prepare
    runs-on: ubuntu-latest
    outputs:
      docker_compose_file: ${{ steps.generate-compose.outputs.compose_file }}
    steps:
    - name: Pull sample images
      run: |
        docker pull nginx:alpine
        docker pull redis:alpine
        docker pull postgres:15-alpine

    - name: Generate docker-compose.yaml
      id: generate-compose
      run: |
        set -euo

        mkdir -p $GITHUB_WORKSPACE/tmp
        mkdir -p $GITHUB_WORKSPACE/tmp/web
        mkdir -p $GITHUB_WORKSPACE/tmp/cache
        mkdir -p $GITHUB_WORKSPACE/tmp/db

        echo -e "FROM nginx:alpine" > $GITHUB_WORKSPACE/tmp/web/Dockerfile
        echo -e "FROM redis:alpine" > $GITHUB_WORKSPACE/tmp/cache/Dockerfile
        echo -e "FROM postgres:15-alpine" > $GITHUB_WORKSPACE/tmp/db/Dockerfile

        COMPOSE_FILE="${GITHUB_WORKSPACE}/tmp/sample-compose.yaml"

        cat <<EOF > "$COMPOSE_FILE"
        version: '3.8'
        services:
          web:
            image: nginx:alpine
            build:
              context: ./tmp/web
              dockerfile: Dockerfile
          cache:
            image: redis:alpine
            build:
              context: ./tmp/cache
              dockerfile: Dockerfile
          db:
            image: postgres:15-alpine
            build:
              context: ./tmp/db
              dockerfile: Dockerfile
        EOF
        echo "compose_file=$COMPOSE_FILE" >> $GITHUB_OUTPUT

  manual-build-and-push-images:
    needs: [checkout-and-prepare, prepare-docker-samples]
    uses: NHSDigital/dtos-devops-templates/.github/workflows/stage-3-build-images.yaml@feat/DTOSS-8958-Update-Stage-3-Build-Definition
    permissions:
      contents: read
      id-token: write
      pull-requests: read
      packages: write
    with:
      docker_compose_file: ${{ needs.prepare-docker-samples.outputs.docker_compose_file }}
      excluded_containers_csv_list: azurite,azurite-setup,sql-edge,db-setup
      environment_tag: ${{ needs.checkout-and-prepare.outputs.environment_tag }}
      function_app_source_code_path: application/CohortManager/src
      project_name: dtoss-8958-test
      commit_sha: feat/DTOSS-8958-Update-Stage-3-Build-Definition
      changed_folders: ./tmp
    secrets: inherit

  cleanup-sample-images:
    needs: manual-build-and-push-images
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Remove sample images
        run: |
          for image in nginx:alpine redis:alpine postgres:15-alpine; do
            docker rmi $image || echo "Image $image not found or already removed"
          done

