name: Docker Image CI

on:
  push:
    branches: ["DTOSS-3494-dokcer-build-changed-functions"]

jobs:
  get-changed-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - uses: tj-actions/changed-files@v44 
        id: changed-files
        with:
          dir_names: "true"
          files: application/CohortManager/src/Functions/**

      - run: |
          for dir in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "$dir"
          done


    
